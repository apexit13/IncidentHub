name: Deploy IncidentHub API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'IncidentHub.Api/**'
  workflow_dispatch:

jobs:
  build:
    name: Build and Package API
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      working-directory: IncidentHub.Api
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      working-directory: IncidentHub.Api
      
    - name: Publish
      run: dotnet publish --configuration Release --no-build --output ./publish
      working-directory: IncidentHub.Api

    - name: Zip artifact for deployment
      run: cd IncidentHub.Api/publish && zip -r ../../deployment.zip .
 
    - name: Upload Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: api-package
        path: deployment.zip

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Download Artifact from GitHub
      uses: actions/download-artifact@v4
      with:
        name: api-package

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: api-incidenthub-demo
        package: deployment.zip