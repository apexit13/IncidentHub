name: Deploy IncidentHub API to Azure

on:
  push:
    branches: 
      - main
    paths: 
      - 'IncidentHub.Api/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.x'
  AZURE_WEBAPP_NAME: api-incidenthub-demo
  AZURE_RESOURCE_GROUP: rg-demo-projects

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release
      
    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal
      
    - name: Publish
      run: dotnet publish --no-build --configuration Release --output ./publish
      
    - name: Deploy to Azure
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
        
    - name: Health Check
      run: |
        sleep 30
        response=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/swagger)
        if [ $response != "200" ]; then
          echo "Health check failed with status $response"
          exit 1
        fi
        
    - name: Notify on Success
      if: success()
      run: echo "🚀 IncidentHub API deployed successfully to https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"