name: Deploy IncidentHub Web to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'IncidentHub.Web/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: IncidentHub.Web/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: IncidentHub.Web
      
    - name: Run tests
      run: npm test -- --watchAll=false --coverage
      working-directory: IncidentHub.Web
      
    - name: Build application
      run: npm run build
      working-directory: IncidentHub.Web
      
    - name: Zip build artifact
      run: cd IncidentHub.Web/dist && zip -r ../../web-deployment.zip .
 
    - name: Upload Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: web-package
        path: web-deployment.zip

  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Download Artifact from GitHub
      uses: actions/download-artifact@v4
      with:
        name: web-package

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: \${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: \${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN