name: Deploy IncidentHub Web to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'IncidentHub.Web/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: IncidentHub.Web/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: IncidentHub.Web
      
    - name: Build application
      run: npm run build
      working-directory: IncidentHub.Web
      env:
        NODE_OPTIONS: '--experimental-vm-modules'
      
    - name: Upload Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: web-package
        path: IncidentHub.Web/dist

  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Download Artifact from GitHub
      uses: actions/download-artifact@v4
      with:
        name: web-package

    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/"
        api_location: ""
        output_location: "dist"
        skip_app_build: true
        skip_api_build: true